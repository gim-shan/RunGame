<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Runner</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            Score: <span id="score">0</span> | 
            Level: <span id="currentLevel">None</span>
        </div>
        
        <div id="menu-overlay" class="overlay">
            <h1>CYBER RUNNER</h1>
            <p>NEON PROTOCOL ACTIVE</p>
            <div class="button-group">
                <button onclick="menu.selectLevel(1)">Beginner</button>
                <button onclick="menu.selectLevel(2)">Advanced</button>
                <button onclick="menu.selectLevel(3)">Expert</button>
            </div>
        </div>

        <div id="death-overlay" class="overlay" style="display: none;">
            <h1>CONNECTION LOST</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <div class="button-group">
                <button class="btn-restart" onclick="game.restart()">Reboot</button>
                <button onclick="game.backToMenu()">Main Menu</button>
            </div>
        </div>
    </div>

    <script src="js/Player.js"></script>
    <script src="js/Obstacle.js"></script>
    <script src="js/Game.js"></script>
    <script src="js/Menu.js"></script>
</body>
</html>
